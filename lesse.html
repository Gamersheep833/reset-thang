<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Counter</title>
  <style>
    // yooooo nvm lets remove it
    body {
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
    }
    button {
      font-size: 18px;
      padding: 12px 20px;
      cursor: pointer;
    }
    .buttons {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="buttons">
    <button id="countBtn">Clicked 0 times</button>
    <button id="resetBtn">Reset</button>
  </div>

  <script>
    let count = 0;
    const countButton = document.getElementById("countBtn");
    const resetButton = document.getElementById("resetBtn");

    countButton.addEventListener("click", () => {
      count += 1;
      countButton.textContent = `Clicked ${count} times`;
    });

    resetButton.addEventListener("click", () => {
      count = 0;
      countButton.textContent = `Clicked ${count} times`;
    });
  </script>
</body>
</html>
